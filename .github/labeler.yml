# PR auto-labelling by changed path (actions/labeler@v5).
# Label definitions live in .github/labels.yml; this file only maps paths to them.

'scope: packages':
  - changed-files:
      - any-glob-to-any-file:
          - 'packages/nest-profiler/**'
          - 'packages/nest-profiler-*/**'

'scope: docs':
  - changed-files:
      - any-glob-to-any-file:
          - 'docs/**'

'scope: examples':
  - changed-files:
      - any-glob-to-any-file:
          - 'examples/**'

'scope: ci':
  - changed-files:
      - any-glob-to-any-file:
          - '.github/**'
          - '.husky/**'
          - 'scripts/**'
          - 'turbo.json'
          - 'package.json'
          - 'pnpm-workspace.yaml'
          - 'commitlint.config.mjs'
          - 'lint-staged.config.mjs'
          - 'docker-compose.yml'

'package: nest-profiler':
  - changed-files:
      - any-glob-to-any-file:
          - 'packages/nest-profiler/**'

'package: nest-profiler-auth':
