name: Release

on:
  push:
    branches: ['main']

permissions:
  contents: write
  pull-requests: write
  packages: write

concurrency:
  # Never cancel an in-flight release: a half-published run must finish.
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  # Disable Husky hooks: the release commit created by changesets/action
  # (chore(release): version packages) must bypass the local lint-staged /
  # commitlint hooks — the CI gates validate it instead.
  HUSKY: 0

jobs:
  release:
    name: Version or publish packages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://npm.pkg.github.com'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          # Conventional-Commit message/title for the changeset-release PR so the
          # required commitlint and semantic-PR-title checks accept the squash merge.
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ALLOW_MAJOR_BUMPS: ${{ vars.ALLOW_MAJOR_BUMPS }}
