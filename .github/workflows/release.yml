name: Release

on:
  push:
    branches: ['main']

permissions:
  contents: write
  pull-requests: write
  packages: write

env:
  # Disable Husky hooks: the "Version Packages" commit made by changesets/action
  # must not go through commitlint / lint-staged, which would reject it.
  HUSKY: 0

jobs:
  release:
    name: Version or publish packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://npm.pkg.github.com'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ALLOW_MAJOR_BUMPS: ${{ vars.ALLOW_MAJOR_BUMPS }}
