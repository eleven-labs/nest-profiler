name: Quality

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-quality:
    name: Package and docs quality checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build
        env:
          # Authenticate the GitHub API calls made while prerendering the docs
          # site (GithubInfo widget) so the build does not hit the anonymous
          # per-IP rate limit.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate package manifests
        run: pnpm publint

      - name: Dry-run npm packaging
        run: pnpm pack:dry-run

      - name: Validate type resolution (attw)
        run: pnpm attw

  skill-references:
    name: Skill references in sync
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The add-nest-profiler-collector skill bundles generated copies of the
      # collectors-*.md references. Fail if they drift from their single source
      # (setup-nest-profiler/references) — run `pnpm sync:skill-refs` to fix.
      - name: Verify skill references are in sync
        run: pnpm sync:skill-refs:check
