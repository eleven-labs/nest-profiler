name: Quality

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package-quality:
    name: Package and docs quality checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Validate package manifests
        run: pnpm publint

      - name: Dry-run npm packaging
        run: pnpm pack:dry-run
