name: CI

on:
  push:
    branches: ['main']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check (format, lint, typecheck, build, Node 24)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        # Cap Turbo concurrency: type-aware ESLint is memory-heavy and running
        # one process per package on a 2-core runner starves the largest one
        # (docs), making its worker time out with "Atomics.wait() failed".
        run: pnpm lint
        env:
          TURBO_CONCURRENCY: 2

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
        env:
          # Authenticate GitHub API calls made while prerendering the docs site
          # (GithubInfo widget). Without it, anonymous requests share the per-IP
          # 60 req/h limit and the build fails with "API rate limit exceeded".
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24, 26]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test with coverage
        run: pnpm test:cov

      - name: Upload coverage reports to Codecov
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          set -euo pipefail
          curl -Os https://cli.codecov.io/latest/linux/codecov
          chmod +x codecov
          for dir in packages/*/; do
            name=$(basename "${dir%/}")
            file="${dir}coverage/lcov.info"
            [ -f "$file" ] || continue
            echo "Uploading coverage for $name"
            ./codecov upload-process \
              --disable-search \
              --flag "$name" \
              --file "$file" \
              --fail-on-error \
              --token "$CODECOV_TOKEN"
          done

  e2e:
    name: E2E (example-api, ${{ matrix.sql-orm }}, Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        # Single Node version: unit tests cover 22/24/26; 24 is the floor for require(esm) (mikro-orm v7 ESM).
        node-version: [24]
        sql-orm: [typeorm, mikro-orm]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: profiler
          POSTGRES_PASSWORD: profiler
          POSTGRES_DB: profiler_example
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U profiler -d profiler_example"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mongodb:
        image: mongo:7-jammy
        env:
          MONGO_INITDB_DATABASE: profiler_example
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # typeorm (primary) runs the full suite minus content/cli; mikro-orm (secondary) runs only the
      # SQL_ORM-dependent specs. content/cli depend on HTTP_CLIENT — the step below runs them once per client.
      - name: E2E tests
        run: pnpm turbo run test:e2e --filter=example-api
        env:
          SQL_ORM: ${{ matrix.sql-orm }}
          E2E_SKIP_HTTP_SPECS: ${{ matrix.sql-orm == 'typeorm' && 'true' || '' }}
          E2E_ORM_DEPENDENT_ONLY: ${{ matrix.sql-orm == 'mikro-orm' && 'true' || '' }}

      - name: E2E HTTP clients (content + cli, axios & fetch)
        if: matrix.sql-orm == 'typeorm'
        run: pnpm --filter example-api test:e2e:http-clients

  commitlint:
    name: Validate commit messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate PR commits
        run: >-
          pnpm exec commitlint
          --from ${{ github.event.pull_request.base.sha }}
          --to ${{ github.event.pull_request.head.sha }}
          --verbose

  ci:
    # Stable required status check: the branch ruleset requires "CI", which stays
    # green/red regardless of the Node matrix dimensions reported by `test`.
    name: CI
    runs-on: ubuntu-latest
    needs: [check, test, e2e]
    if: always()
    steps:
      - name: Check required jobs succeeded
        run: |
          if [ "${{ needs.check.result }}" != "success" ] || [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.e2e.result }}" != "success" ]; then
            echo "One or more required CI jobs failed (check=${{ needs.check.result }}, test=${{ needs.test.result }}, e2e=${{ needs.e2e.result }})."
            exit 1
          fi
          echo "All CI jobs passed."
