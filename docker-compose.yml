services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: profiler
      POSTGRES_PASSWORD: profiler
      POSTGRES_DB: profiler_example
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U profiler -d profiler_example"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
